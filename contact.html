<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve | Saanjh Café</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: var(--espresso);
            overflow: hidden; /* Fix for absolute centering and particles */
        }
        
        .contact-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Lighting */
        .ambient-light-1 {
            position: absolute;
            top: 20%; left: 20%;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(210, 140, 70, 0.15), transparent 60%);
            border-radius: 50%;
            filter: blur(60px);
            animation: drift 20s infinite alternate ease-in-out;
            z-index: 0;
        }
        
        .ambient-light-2 {
            position: absolute;
            bottom: 10%; right: 20%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(166, 114, 69, 0.1), transparent 60%);
            border-radius: 50%;
            filter: blur(80px);
            animation: drift 25s infinite alternate-reverse ease-in-out;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, -10vh) scale(1.1); }
        }

        /* Glassmorphism Form */
        .reserve-card {
            position: relative;
            z-index: 10;
            background: rgba(22, 16, 13, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(234, 221, 207, 0.08);
            border-radius: 12px;
            padding: 4rem 5rem;
            width: 90%; max-width: 600px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
        }

        .card-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .card-header .ed-title {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .card-header .ed-desc {
            font-size: 1.1rem;
        }

        /* Floating Particles */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(210, 140, 70, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(210, 140, 70, 0.4);
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body class="loading">
    <div class="noise"></div>
    <div class="page-transition"></div>
    
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo page-link" data-magnetic>Saanjh</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link page-link" data-magnetic>Home</a>
                <a href="history.html" class="nav-link page-link" data-magnetic>Story</a>
                <a href="menu.html" class="nav-link page-link" data-magnetic>Menu</a>
                <a href="gallery.html" class="nav-link page-link" data-magnetic>Gallery</a>
                <a href="contact.html" class="nav-link active" data-magnetic>Contact</a>
            </div>
        </div>
    </nav>

    <div class="contact-wrapper">
        <div class="ambient-light-1" data-depth="0.05"></div>
        <div class="ambient-light-2" data-depth="-0.03"></div>
        <div class="particles" id="particles"></div>

        <div class="reserve-card" data-depth="0.02">
            <div class="card-header">
                <h1 class="ed-title">An <em>Evening</em> Waits</h1>
                <p class="ed-desc">Secure your corner of twilight.</p>
            </div>
            
            <form class="reserve-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <input type="text" id="name" required placeholder=" ">
                    <label for="name">Name</label>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <select id="guests" required>
                            <option value="" disabled selected>Guests</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4+">4+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary submit-btn" data-magnetic style="width:100%; margin-top:2rem;">Confirm Reservation</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="global.js"></script>
    <script>
        // Form specific 2.5D tilt to make the glass feel physical
        const card = document.querySelector('.reserve-card');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            gsap.to(card, {
                rotateX: -y * 5,
                rotateY: x * 5,
                duration: 2,
                ease: "power2.out"
            });
        });

        // Entrance Animation
        gsap.from(card, {
            y: 50, opacity: 0, duration: 2, ease: "expo.out", delay: 0.5
        });

        // Simple Ambient Particle System
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Random properties
            const size = Math.random() * 4 + 1;
            const left = Math.random() * 100;
            const duration = Math.random() * 10 + 10;
            const delay = Math.random() * 10;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `-${delay}s`;
            
            particleContainer.appendChild(particle);
        }

        // Form Submit Simulation
        const form = document.querySelector('.reserve-form');
        form.addEventListener('submit', () => {
            const btn = form.querySelector('.submit-btn');
            const originalText = btn.innerText;
            
            btn.innerText = 'Confirmed';
            gsap.to(btn, { backgroundColor: "rgba(210, 140, 70, 0.3)", duration: 0.4 });
            
            setTimeout(() => {
                btn.innerText = originalText;
                gsap.to(btn, { clearProps: "backgroundColor" });
                form.reset();
            }, 3000);
        });
    </script>
</body>
</html>
