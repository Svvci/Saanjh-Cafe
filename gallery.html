<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere | Saanjh Café</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
    </style>
    
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-hero {
            height: 60vh;
            display: flex;
            align-items: flex-end;
            padding: 0 10vw;
            background: radial-gradient(circle at top, var(--dark-brown) 0%, var(--espresso) 100%);
            position: relative;
        }

        .moodboard-grid {
            padding: 5rem 10vw 10rem;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
            background: var(--espresso);
            position: relative;
            z-index: 2;
        }

        .mb-item {
            position: relative;
            perspective: 1000px;
        }

        .mb-1 { grid-column: 1 / 8; height: 70vh; }
        .mb-2 { grid-column: 9 / 13; height: 50vh; margin-top: 15rem; }
        .mb-3 { grid-column: 2 / 6; height: 60vh; margin-top: 5rem; }
        .mb-4 { grid-column: 7 / 12; height: 80vh; margin-top: -10rem; }

        .mb-inner {
            width: 100%; height: 100%;
            border-radius: 4px;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        .mb-inner img {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.1) translateZ(-50px);
            transition: filter 1s var(--ease-cinematic);
            filter: brightness(0.7) contrast(1.1);
        }

        .mb-inner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            pointer-events: none;
            transform: translateZ(50px);
        }

        .mb-item:hover .mb-inner img {
            filter: brightness(1) contrast(1);
        }

    </style>
</head>
<body class="loading">
    <div class="noise"></div>
    <div class="page-transition"></div>
    
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo page-link" data-magnetic>Saanjh</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link page-link" data-magnetic>Home</a>
                <a href="history.html" class="nav-link page-link" data-magnetic>Story</a>
                <a href="menu.html" class="nav-link page-link" data-magnetic>Menu</a>
                <a href="gallery.html" class="nav-link active" data-magnetic>Gallery</a>
                <a href="contact.html" class="nav-link page-link" data-magnetic>Contact</a>
            </div>
        </div>
    </nav>

    <div class="scroll-container">
        <section class="gallery-hero">
            <h1 class="ed-title" data-depth="0.1" style="font-size: 6rem;">Visual <br><em>Archive.</em></h1>
        </section>

        <section class="moodboard">
            <div class="moodboard-grid">
                
                <div class="mb-item mb-1" data-speed="0.95">
                    <div class="mb-inner">
                        <img src="interior1.jpg" alt="Gallery">
                    </div>
                </div>

                <div class="mb-item mb-2" data-speed="1.1">
                    <div class="mb-inner">
                        <img src="interior2.jpg" alt="Gallery">
                    </div>
                </div>

                <div class="mb-item mb-3" data-speed="0.9">
                    <div class="mb-inner">
                        <img src="interior3.jpg" alt="Gallery">
                    </div>
                </div>

                <div class="mb-item mb-4" data-speed="1.15">
                    <div class="mb-inner">
                        <img src="interior4.jpg" alt="Gallery">
                    </div>
                </div>

            </div>
        </section>

        <!-- Premium Footer -->
        <footer class="footer">
            <div class="container footer-container">
                <div class="footer-brand">
                    <h2>Saanjh</h2>
                </div>
                <div class="footer-links">
                    <a href="index.html" class="page-link" data-magnetic>Home</a>
                    <a href="contact.html" class="page-link" data-magnetic>Contact</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Saanjh. Cinematic Coffee Experience.</p>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="global.js"></script>
    <script>
        // 2.5D Hover Physics for Gallery
        const galleryItems = document.querySelectorAll('.mb-item');
        galleryItems.forEach(item => {
            const inner = item.querySelector('.mb-inner');
            
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -8; // subtle tilt
                const rotateY = ((x - centerX) / centerX) * 8;
                
                gsap.to(inner, {
                    rotateX: rotateX,
                    rotateY: rotateY,
                    duration: 0.5,
                    ease: "power2.out"
                });
            });

            item.addEventListener('mouseleave', () => {
                gsap.to(inner, {
                    rotateX: 0,
                    rotateY: 0,
                    duration: 1,
                    ease: "power3.out"
                });
            });
        });

        gsap.from('.mb-item', {
            y: 100, opacity: 0, duration: 2, stagger: 0.2, ease: "power4.out",
            scrollTrigger: {
                trigger: ".moodboard-grid",
                start: "top 80%"
            }
        });
    </script>
</body>
</html>
